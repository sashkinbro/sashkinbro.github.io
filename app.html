      const hero = document.getElementById('app-hero');
      const featuresList = document.getElementById('app-features');
      const longText = document.getElementById('app-long');
      const infoGrid = document.getElementById('app-info');
      const gallery = document.getElementById('app-gallery');

      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightbox-img');
      let lightboxApp = null;
      let lightboxIndex = 0;
      let currentLang = 'uk';

      function openLightbox(appId, index){
        const listByLang = screenshots[appId] && screenshots[appId][currentLang];
        if(!listByLang || !listByLang.length) return;
        lightboxApp = appId;
        lightboxIndex = index;
        if(lightboxIndex < 0) lightboxIndex = listByLang.length - 1;
        if(lightboxIndex >= listByLang.length) lightboxIndex = 0;
        lightboxImg.src = listByLang[lightboxIndex];
        lightbox.hidden = false;
      }
      function closeLightbox(){
        lightbox.hidden = true;
        lightboxApp = null;
      }
      function stepLightbox(delta){
        if(lightboxApp==null) return;
        openLightbox(lightboxApp, lightboxIndex + delta);
      }

      lightbox.addEventListener('click', (e)=>{
        if(e.target.hasAttribute('data-lightbox-close')){
          closeLightbox();
        } else if(e.target.hasAttribute('data-lightbox-prev')){
          stepLightbox(-1);
        } else if(e.target.hasAttribute('data-lightbox-next')){
          stepLightbox(1);
        }
      });
      document.addEventListener('keydown', (e)=>{
        if(lightbox.hidden) return;
        if(e.key === 'Escape') closeLightbox();
        if(e.key === 'ArrowLeft') stepLightbox(-1);
        if(e.key === 'ArrowRight') stepLightbox(1);
      });

      function renderGallery(appId){
        const listByLang = screenshots[appId] && screenshots[appId][currentLang] || [];
        gallery.innerHTML = '';
        listByLang.forEach((src, idx)=>{
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'shot-thumb app-shot';
          btn.setAttribute('aria-label', 'Open screenshot ' + (idx+1));
          btn.innerHTML = `<img src="${src}" loading="lazy" decoding="async" alt="">`;
          btn.addEventListener('click', ()=>openLightbox(appId, idx));
          gallery.appendChild(btn);
        });
      }

      function renderApp(lang){
        currentLang = lang;

        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const app = apps[id];
        if(!app){
          hero.innerHTML = `<p>App not found. <a href="index.html">Back to main page</a></p>`;
          document.querySelector('.app-tabs').style.display = 'none';
          document.querySelector('.app-gallery-panel').style.display = 'none';
          return;
        }

        document.title = app.title[lang] + ' — Sashkin Apps';

        hero.innerHTML = `
          <div class="app-hero-head">
            <img class="icon icon-large" src="${app.icon}" alt="${app.title[lang]}" width="96" height="96" loading="lazy" decoding="async">
            <div class="app-hero-meta">
              <h1 class="app-hero-title">${app.title[lang]}</h1>
              <div class="meta-row">
                <span class="badge">Android</span>
                ${app.isNew ? `<span class="pill pill-new">${i18n[lang].pillNew}</span>` : ''}
              </div>
              <div class="category">${app.category[lang]}</div>
            </div>
          </div>
          <p class="app-hero-short">${app.short[lang]}</p>
          <div class="actions app-hero-actions">
            <a class="btn" href="${app.link}" target="_blank" rel="noopener">
              <span class="btn-icon" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M3 2.5c0-1 1.1-1.6 2-1.1l15 8.5c.9.5.9 1.8 0 2.3l-15 8.5c-.9.5-2-.1-2-1.1V2.5Z"/>
                </svg>
              </span>
              <span>${i18n[lang].gp}</span>
            </a>
          </div>
        `;

        const img = hero.querySelector('img.icon');
        img.addEventListener('error', () => { img.src = svgFallback(app.fallback); }, { once:true });

        // Огляд — дозволяємо багаторядковий текст
        longText.textContent = app.long[lang];

        // Можливості
        featuresList.innerHTML = '';
        app.features[lang].forEach(f=>{
          const li = document.createElement('li');
          li.textContent = f;
          featuresList.appendChild(li);
        });

        // Інформація
        infoGrid.innerHTML = '';
        const info = app.info;
        const rows = [
          [i18n[lang].infoCategory, app.category[lang]],
          [i18n[lang].infoAndroid, info.minAndroid],
          [i18n[lang].infoSize, info.size],
          [i18n[lang].infoIap, info.inApp ? i18n[lang].infoYes : i18n[lang].infoNo],
          [i18n[lang].infoOffline, info.offline ? i18n[lang].infoYes : i18n[lang].infoNo],
          [i18n[lang].infoUpdated, info.updated],
          [i18n[lang].infoPrivacy, info.privacy[lang]],
          [i18n[lang].infoData, info.data[lang]]
        ];
        rows.forEach(([label,value])=>{
          const dt = document.createElement('dt');
          dt.textContent = label;
          const dd = document.createElement('dd');
          dd.textContent = value;
          infoGrid.appendChild(dt);
          infoGrid.appendChild(dd);
        });

        // локалізація статичних текстів
        document.querySelectorAll('[data-i18n]').forEach(el=>{
          const key = el.getAttribute('data-i18n');
          if(i18n[lang][key]){
            el.textContent = i18n[lang][key];
          }
        });

        renderGallery(app.id);
      }

      function setupTabs(){
        const tabButtons = document.querySelectorAll('.tab-btn');
        const panels = {
          overview: document.getElementById('tab-overview'),
          features: document.getElementById('tab-features'),
          info: document.getElementById('tab-info')
        };
        tabButtons.forEach(btn=>{
          btn.addEventListener('click', ()=>{
            const tab = btn.dataset.tab;
            tabButtons.forEach(b=>{
              const active = b===btn;
              b.classList.toggle('active', active);
              b.setAttribute('aria-selected', String(active));
            });
            Object.entries(panels).forEach(([name,panel])=>{
              panel.hidden = name!==tab;
            });
          });
        });
      }

      const btnUk = document.getElementById('btn-uk');
      const btnRu = document.getElementById('btn-ru');
      const btnEn = document.getElementById('btn-en');

      function setLang(lang){
        document.documentElement.lang = lang;
        [btnUk, btnRu, btnEn].forEach(b=>{
          const active = b.dataset.lang===lang;
          b.classList.toggle('active', active);
          b.setAttribute('aria-selected', String(active));
        });
        renderApp(lang);
        localStorage.setItem('lang', lang);
      }

      const themeBtn = document.getElementById('themeToggle');
      function applyTheme(mode){
        document.documentElement.setAttribute('data-theme', mode);
        localStorage.setItem('theme', mode);
      }
      function initTheme(){
        const stored = localStorage.getItem('theme');
        if(stored){
          applyTheme(stored);
          return;
        }
        applyTheme(window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      }

      document.getElementById('y').textContent = new Date().getFullYear();
      initTheme();
      setupTabs();
      setLang(localStorage.getItem('lang') || 'uk');
      btnUk.onclick = () => setLang('uk');
      btnRu.onclick = () => setLang('ru');
      btnEn.onclick = () => setLang('en');
      themeBtn.onclick = () =>
        applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    </script>
