<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#020617" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <title>Sashkin Apps — офіційна сторінка розробника</title>
    <meta name="description" content="Офіційний сайт Sashkin Apps: ігри та застосунки для Android. Quizary, Quotes+ та інші. Завантажуйте з Google Play." />

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>📱</text></svg>">
    <link rel="preload" as="image" href="/assets/sashkinapps.png" imagesrcset="/assets/sashkinapps.png 1x, /assets/sashkinapps.png 2x" imagesizes="(min-width: 900px) 56px, 44px">
    <link rel="preload" as="image" href="/assets/sashkinapps2.png" imagesizes="100vw">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Sashkin Apps — офіційна сторінка розробника">
    <meta property="og:description" content="Ігри та застосунки для Android. Красиві, швидкі та з повагою до приватності.">
    <meta property="og:image" content="/assets/sashkinapps2.png">
    <meta property="og:locale" content="uk_UA">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Sashkin Apps">
    <meta name="twitter:description" content="Ігри та застосунки для Android.">
    <meta name="twitter:image" content="/assets/sashkinapps2.png">

    <style>
      *,*::before,*::after{box-sizing:border-box}
      html,body{margin:0;padding:0}
      img{max-width:100%;display:block}
      button{font:inherit}

      :root{
        --bg:#f7f8fc;
        --bg-accent:#ffffff;
        --text:#0e1327;
        --muted:#556080b3;
        --line:#e5e8f5;
        --surface:#ffffff;
        --brand:#1b4bff;
        --shadow:0 10px 30px rgba(24,39,75,.08)
      }

      /* Темна тема за замовчуванням (якщо в системі dark) */
      @media (prefers-color-scheme: dark){
        :root{
          --bg:#020617;
          --bg-accent:
            radial-gradient(900px 600px at 10% -10%, #0f172a 0%, transparent 60%),
            radial-gradient(900px 600px at 120% 120%, #020617 0%, transparent 60%),
            #020617;
          --text:#e5ecff;
          --muted:#9fa8dbaa;
          --line:rgba(148,163,255,.24);
          --surface:linear-gradient(180deg,#0b1120 0%, #020617 100%);
          --shadow:0 30px 80px rgba(15,23,42,.9);
        }

        /* Логотип у хедері в темній темі (через системний dark) */
        .logo{
          border-color:rgba(148,163,255,.55);
          box-shadow:0 0 0 1px rgba(15,23,42,.9),0 0 18px rgba(59,130,246,.55);
          background:#020617;
        }

        header .glass{
          background: color-mix(in oklab, #020617 88%, transparent);
          box-shadow: 0 1px 0 rgba(15,23,42,.9);
        }
      }

      /* Явне перемикання теми через data-theme */
      [data-theme="light"]{
        --bg:#f7f8fc;
        --bg-accent:#ffffff;
        --text:#0e1327;
        --muted:#556080b3;
        --line:#e5e8f5;
        --surface:#ffffff;
        --shadow:0 10px 30px rgba(24,39,75,.08);
      }

      [data-theme="dark"]{
        --bg:#020617;
        --bg-accent:
          radial-gradient(900px 600px at 10% -10%, #0f172a 0%, transparent 60%),
          radial-gradient(900px 600px at 120% 120%, #020617 0%, transparent 60%),
          #020617;
        --text:#e5ecff;
        --muted:#9fa8dbaa;
        --line:rgba(148,163,255,.24);
        --surface:linear-gradient(180deg,#0b1120 0%, #020617 100%);
        --shadow:0 30px 80px rgba(15,23,42,.9);
      }

      /* Логотип окремо, щоб завжди добре виглядав у темній темі */
      [data-theme="dark"] .logo{
        border-color:rgba(148,163,255,.55);
        box-shadow:0 0 0 1px rgba(15,23,42,.9),0 0 18px rgba(59,130,246,.55);
        background:#020617;
      }

      body{
        font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial;
        color:var(--text);
        background:var(--bg-accent);
        min-height:100dvh
      }
      .container{max-width:1100px;margin:0 auto;padding:16px clamp(16px,3.5vw,28px)}

      /* Хедер (glass) */
      header{position:sticky;top:0;z-index:10;border-bottom:1px solid var(--line)}
      header .glass{
        background: color-mix(in oklab, var(--bg) 38%, transparent);
        backdrop-filter: blur(14px) saturate(140%);
        -webkit-backdrop-filter: blur(14px) saturate(140%);
        box-shadow: 0 1px 0 rgba(255,255,255,.6) inset;
      }
      .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 0}
      .brand{display:flex;align-items:center;gap:12px;text-decoration:none;color:inherit}

      .logo{
        width: clamp(44px, 5vw, 56px);
        height: clamp(44px, 5vw, 56px);
        aspect-ratio: 1/1;
        border-radius: 12px;
        border:1px solid color-mix(in oklab, var(--line) 80%, transparent);
        object-fit: cover;
        box-shadow: 0 1px 0 rgba(255,255,255,.7) inset;
      }

      .controls{display:flex;gap:8px}
      .chip{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);padding:6px 10px;border-radius:999px;background:color-mix(in oklab, var(--bg) 90%, transparent)}
      .chip button{border:0;background:transparent;padding:6px 8px;border-radius:8px;cursor:pointer;font-weight:700;color:var(--muted)}
      .chip button.active{color:var(--text);background:color-mix(in oklab, var(--bg) 70%, transparent)}
      .tbtn{border:1px solid var(--line);background:color-mix(in oklab, var(--bg) 85%, transparent);padding:8px 10px;border-radius:12px;cursor:pointer}

      /* Банер: десктоп */
      .brand-banner{
        margin:14px 0 22px;
        border:1px solid var(--line);
        border-radius: 20px;
        overflow: hidden;
        position: relative;
        aspect-ratio: 7/2;
        min-height: clamp(180px, 26vw, 280px);
        background: center/cover no-repeat url('/assets/sashkinapps2.png'), var(--surface);
      }
      .brand-banner::after{
        content:"";
        position:absolute; inset:0;
        background:
          linear-gradient(90deg,color-mix(in oklab, var(--bg) 70%, transparent) 0%, transparent 55%),
          radial-gradient(60% 120% at 10% 0%, rgba(255,255,255,.15), transparent 60%);
        pointer-events: none;
      }

      /* Банер: мобільний (≤740px) */
      @media (max-width:740px){
        .brand-banner{
          aspect-ratio: auto;
          height: clamp(120px, 38vw, 160px);
          border-radius: 16px;
          margin:10px 0 16px;
          background-position: left 12% center;
          background-size: cover;
        }
        .brand-banner::after{
          background:
            linear-gradient(90deg,color-mix(in oklab, var(--bg) 65%, transparent) 0%, transparent 45%);
        }
      }

      .hero{
        margin:0 0 22px;
        padding:18px clamp(14px,3vw,22px);
        border:1px solid var(--line);
        border-radius:16px;
        box-shadow:var(--shadow)
      }
      .hero, .card, footer{
        background: color-mix(in oklab, var(--bg) 20%, transparent);
        backdrop-filter: blur(8px) saturate(120%);
        -webkit-backdrop-filter: blur(8px) saturate(120%);
        box-shadow: var(--shadow);
      }

      .hero h1{margin:0 0 6px;font-size:clamp(24px, 5.5vw, 40px);letter-spacing:.2px}
      .hero p{margin:8px 0 0;color:var(--muted);font-size:clamp(14px, 3.5vw, 16px)}

      .row{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px}
      .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;margin-top:14px}
      .card{
        display:flex;
        flex-direction:column;
        gap:12px;
        border:1px solid var(--line);
        border-radius:18px;
        padding:14px;
        min-height:220px;
        transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease
      }
      .card:hover{
        transform:translateY(-2px);
        box-shadow:0 14px 40px rgba(24,39,75,.18);
        border-color: color-mix(in oklab, var(--brand) 30%, var(--line))
      }
      @media (prefers-reduced-motion: reduce){
        .card{transition:none}
        .card:hover{transform:none}
      }

      .app-head{display:flex;gap:12px;align-items:center}
      .icon{
        width:72px;
        height:72px;
        border-radius:14px;
        border:1px solid var(--line);
        object-fit:cover;
        background:color-mix(in oklab, var(--bg) 85%, transparent)
      }
      .title{font-size:18px;margin:0}
      .badge{
        font-size:12px;
        color:color-mix(in oklab, var(--muted) 92%, transparent);
        border:1px solid var(--line);
        padding:2px 8px;
        border-radius:999px
      }
      .desc{
        color:color-mix(in oklab, var(--text) 80%, transparent);
        line-height:1.6;
        margin:0
      }
      .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:auto}
      .btn{
        --b:var(--brand);
        text-decoration:none;
        display:inline-flex;
        align-items:center;
        gap:8px;
        border:1px solid color-mix(in oklab, var(--b) 35%, var(--line));
        padding:12px 14px;
        border-radius:12px;
        font-weight:700;
        transition:transform .12s ease, border-color .12s ease, box-shadow .12s ease
      }
      .btn:hover{
        border-color:var(--brand);
        transform: translateY(-1px);
        box-shadow:0 8px 24px rgba(24,39,75,.18)
      }

      footer{
        margin:22px 0 10px;
        padding:12px 14px;
        border:1px solid var(--line);
        border-radius:14px;
        color:var(--muted);
        display:flex;
        justify-content:space-between;
        flex-wrap:wrap;
        gap:8px
      }

      :focus-visible{
        outline:2px solid var(--brand);
        outline-offset:2px;
        border-radius:8px
      }
    </style>
  </head>
  <body>
    <header>
      <div class="container topbar glass">
        <a class="brand" href="/" aria-label="На головну">
          <img
            class="logo"
            src="/assets/sashkinapps.png"
            srcset="/assets/sashkinapps.png 1x, /assets/sashkinapps.png 2x"
            sizes="(min-width: 900px) 56px, 44px"
            alt="Sashkin Apps logo"
            width="56" height="56"
            decoding="async"
            fetchpriority="high"
          />
          <div>
            <div style="font-weight:800">Sashkin Apps</div>
            <div class="muted" data-i18n="tagline">Офіційна сторінка розробника</div>
          </div>
        </a>
        <div class="controls">
          <div class="chip" role="tablist" aria-label="Language switcher">
            <button id="btn-uk" class="active" data-lang="uk" role="tab" aria-selected="true">UA</button>
            <button id="btn-ru" data-lang="ru" role="tab" aria-selected="false">RU</button>
            <button id="btn-en" data-lang="en" role="tab" aria-selected="false">EN</button>
          </div>
          <button id="themeToggle" class="tbtn" aria-label="Toggle theme">🌗</button>
        </div>
      </div>
    </header>

    <!-- Банер -->
    <div class="container">
      <section class="brand-banner" aria-label="Sashkin Apps cover"></section>
    </div>

    <main class="container">
      <section class="hero">
        <h1 data-i18n="heroTitle">Мобільні додатки від Sashkin Apps</h1>
        <p data-i18n="heroSubtitle">Ігри та застосунки для Android. Красиві, швидкі та з повагою до приватності.</p>
      </section>

      <section>
        <div class="row">
          <h2 style="margin:0" data-i18n="apps">Додатки</h2>
        </div>
        <div class="grid" id="apps"></div>
      </section>

      <footer>
        <span>© <span id="y"></span> Sashkin Apps</span>
        <span><span data-i18n="contact">Зв'язок:</span> <a href="mailto:sashkinapps@gmail.com">sashkinapps@gmail.com</a></span>
      </footer>
    </main>

    <script type="application/ld+json">
    {"@context":"https://schema.org","@type":"Organization","name":"Sashkin Apps","url":"https://sashkinbro.github.io/","logo":"/assets/sashkinapps.png"}
    </script>

    <script>
      const i18n = {
        uk:{
          tagline:'Офіційна сторінка розробника',
          heroTitle:'Мобільні додатки від Sashkin Apps',
          heroSubtitle:'Ігри та застосунки для Android. Красиві, швидкі та з повагою до приватності.',
          apps:'Додатки',
          gp:'Відкрити в Google Play'
        },
        ru:{
          tagline:'Официальная страница разработчика',
          heroTitle:'Мобильные приложения от Sashkin Apps',
          heroSubtitle:'Игры и приложения для Android. Красивые, быстрые и с уважением к приватности.',
          apps:'Приложения',
          gp:'Открыть в Google Play'
        },
        en:{
          tagline:'Official developer page',
          heroTitle:'Mobile apps by Sashkin Apps',
          heroSubtitle:'Games and apps for Android. Fast, beautiful, and privacy-respecting.',
          apps:'Apps',
          gp:'Open in Google Play'
        }
      };

      const svgFallback = (txt) =>
        `data:image/svg+xml,` +
        encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120'>
          <defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'>
            <stop stop-color='#e9ecff'/><stop offset='1' stop-color='#cfd9ff'/>
          </linearGradient></defs>
          <rect width='100%' height='100%' rx='24' fill='url(#g)'/>
          <text x='50%' y='54%' dominant-baseline='middle' text-anchor='middle'
                font-size='44' fill='#1b4bff' font-family='Inter,Arial,system-ui'>${txt}</text>
        </svg>`);

      const apps = [
        {
          id:'com.sbro.quizary',
          title:{
            uk:'Quizary — Вікторина та Навчання',
            ru:'Quizary — Викторина и Обучение',
            en:'Quizary — Quiz & Learn'
          },
          desc:{
            uk:'Тренуй пам’ять і ерудицію: швидкі раунди, сотні запитань, режим навчання, досягнення та таблиця лідерів.',
            ru:'Тренируй память и эрудицию: быстрые раунды, сотни вопросов, режим обучения, достижения и таблица лидеров.',
            en:'Train memory and knowledge: quick rounds, hundreds of questions, Learning mode, achievements & leaderboards.'
          },
          icon:'/assets/quizary.png',
          fallback:'QZ',
          link:'https://play.google.com/store/apps/details?id=com.sbro.quizary'
        },
        {
          id:'com.sbro.qomoti',
          title:{
            uk:'Quotes+ — Щоденне Натхнення',
            ru:'Quotes+ — Ежедневное Вдохновение',
            en:'Quotes+ — Daily Inspiration'
          },
          desc:{
            uk:'2800+ цитат за категоріями, обрані, історія, віджети та шаринг. Створюй власні картки цитат.',
            ru:'2800+ цитат по категориям, избранное, история, виджеты и шаринг. Создавай собственные карточки цитат.',
            en:'2800+ quotes by categories, favorites, history, widgets & sharing. Create your own quote cards.'
          },
          icon:'/assets/quotesplus.png',
          fallback:'Q+',
          link:'https://play.google.com/store/apps/details?id=com.sbro.qomoti'
        },
        {
          id:'com.sbro.quizaryenglish',
          title:{
            uk:'Quizary English — Вчи Англійську Грою',
            ru:'Quizary English — Учим Английский Играя',
            en:'Quizary English — Learn English by Playing'
          },
          desc:{
            uk:'Вчи англійську через гру: рівні A1–C2, словник і граматика, різні режими та трофеї з таблицею лідерів.',
            ru:'Учите английский в игровом формате: уровни A1–C2, лексика и грамматика, режимы и трофеи с таблицей лидеров.',
            en:'Level up your English through play: CEFR A1–C2, vocabulary & grammar practice, fun game modes plus trophies and leaderboards.'
          },
          icon:'/assets/quizaryenglish.png',
          fallback:'QE',
          link:'https://play.google.com/store/apps/details?id=com.sbro.quizaryenglish'
        },
        {
          id:'com.sbro.qray',
          title:{
            uk:'Qray — Сканер та Генератор QR',
            ru:'Qray — Сканер и Генератор QR',
            en:'Qray — QR Scanner & Generator'
          },
          desc:{
            uk:'Легкий сканер і генератор QR-кодів: миттєве сканування, історія, обране, створення кодів з тексту, лінків та Wi-Fi, підтримка темного й світлого режимів.',
            ru:'Лёгкий сканер и генератор QR-кодов: мгновенное сканирование, история, избранное, создание кодов из текста, ссылок и Wi-Fi, поддержка тёмной и светлой тем.',
            en:'Lightweight QR scanner & generator: instant scanning, history, favorites, create codes from text, links and Wi-Fi with light/dark theme support.'
          },
          icon:'/assets/qray.png',
          fallback:'QR',
          link:'https://play.google.com/store/apps/details?id=com.sbro.qray'
        }
      ];

      const grid = document.getElementById('apps');

      function render(lang){
        document.querySelectorAll('[data-i18n]').forEach(el=>{
          el.textContent = i18n[lang][el.getAttribute('data-i18n')];
        });
        grid.innerHTML = '';
        apps.forEach(app=>{
          const card = document.createElement('article');
          card.className = 'card';
          card.innerHTML = `
            <div class="app-head">
              <img class="icon" width="72" height="72" alt="${app.title[lang]}" src="${app.icon}" loading="lazy" decoding="async">
              <div>
                <h3 class="title">${app.title[lang]}</h3>
                <span class="badge">Android</span>
              </div>
            </div>
            <p class="desc">${app.desc[lang]}</p>
            <div class="actions">
              <a class="btn" href="${app.link}" target="_blank" rel="noopener">${i18n[lang].gp}
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M3.3 1.7 14 12 3.3 22.3c-.8.8-2.3.2-2.3-1V2.7c0-1.2 1.5-1.8 2.3-1Z"/><path d="M15.6 13.6 4.2 22.7c.7.7 1.8.8 2.6.3l13-7.6c.9-.6.9-2 0-2.6l-13-7.6c-.8-.5-1.9-.4-2.6.3l11.4 9Z" opacity=".7"/></svg>
              </a>
            </div>`;
          const img = card.querySelector('img.icon');
          img.addEventListener('error', () => { img.src = svgFallback(app.fallback); }, { once:true });
          grid.appendChild(card);
        });
      }

      const btnUk = document.getElementById('btn-uk');
      const btnRu = document.getElementById('btn-ru');
      const btnEn = document.getElementById('btn-en');
      function setLang(lang){
        document.documentElement.lang = lang;
        [btnUk, btnRu, btnEn].forEach(b=>{
          const active = b.dataset.lang===lang;
          b.classList.toggle('active', active);
          b.setAttribute('aria-selected', String(active));
        });
        render(lang);
        localStorage.setItem('lang', lang);
      }

      const themeBtn = document.getElementById('themeToggle');
      function applyTheme(mode){
        document.documentElement.setAttribute('data-theme', mode);
        localStorage.setItem('theme', mode);
      }
      function initTheme(){
        const stored = localStorage.getItem('theme');
        if(stored){
          applyTheme(stored);
          return;
        }
        applyTheme(window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      }

      document.getElementById('y').textContent = new Date().getFullYear();
      initTheme();
      setLang(localStorage.getItem('lang') || 'uk');
      btnUk.onclick = () => setLang('uk');
      btnRu.onclick = () => setLang('ru');
      btnEn.onclick = () => setLang('en');
      themeBtn.onclick = () => applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    </script>
  </body>
</html>
